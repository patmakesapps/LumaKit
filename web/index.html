<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumaKit</title>
    <link rel="icon" href="/photos/lumakit_cat.png" type="image/png">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Syntax highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <img src="/photos/lumakit_cat.png" alt="LumaKit" class="sidebar-logo">
            <span class="sidebar-title">LumaKit</span>
        </div>
        <button id="new-chat-btn" class="new-chat-btn">+ New Chat</button>
        <nav id="chat-list" class="chat-list"></nav>
        <div class="sidebar-footer">
            <button id="nav-tasks" class="sidebar-nav-btn">Tasks</button>
            <button id="nav-settings" class="sidebar-nav-btn">Settings</button>
        </div>
    </aside>

    <!-- Main content -->
    <main id="main" class="main">
        <!-- Topbar -->
        <header id="topbar" class="topbar">
            <button id="sidebar-toggle" class="sidebar-toggle">&#9776;</button>
            <span id="topbar-title" class="topbar-title">New Chat</span>
            <div class="topbar-right">
                <span id="model-badge" class="model-badge"></span>
                <span id="status-dot" class="status-dot"></span>
            </div>
        </header>

        <!-- Chat view -->
        <div id="chat-view" class="view active chat-view-centered">
            <div id="messages" class="messages">
                <div id="empty-state" class="empty-state">
                    <img src="/photos/lumakit_cat_logo.png" alt="LumaKit" class="empty-logo">
                    <div class="empty-copy">
                        <h1 id="empty-headline" class="empty-headline">Give the cat a mission.</h1>
                        <p id="empty-subcopy" class="empty-subcopy">Ask a question, hand over a task, or start with a command.</p>
                    </div>
                </div>
                <div id="messages-inner" class="messages-inner"></div>
            </div>
            <div class="composer-wrapper">
                <div id="composer" class="composer">
                    <textarea id="input" class="composer-input" placeholder="Message Lumi... (type /stop to interrupt)" rows="1"></textarea>
                    <button id="send-btn" class="composer-btn send-btn" title="Send (type /stop to interrupt)">
                        <img src="/photos/down_arrow.png" alt="" class="send-btn-icon">
                    </button>
                </div>
            </div>
        </div>

        <!-- Task view -->
        <div id="task-view" class="view">
            <div class="panel-content">
                <h2>Tasks</h2>
                <div id="task-list" class="task-list"></div>
            </div>
        </div>

        <!-- Settings view -->
        <div id="settings-view" class="view">
            <div class="panel-content">
                <h2>Settings</h2>
                <div id="settings-content" class="settings-content"></div>
            </div>
        </div>

    </main>

    <div id="setup-overlay" class="setup-overlay hidden">
        <div class="setup-card">
            <div class="setup-kicker">First Run</div>
            <h2 class="setup-title">Choose a model before you start chatting</h2>
            <p class="setup-copy">
                LumaKit needs a primary model to run chat and tool loops. Pick one now.
                You can change it later in Settings.
            </p>
            <button id="setup-open-settings" class="setup-btn">Open Model Settings</button>
        </div>
    </div>

    <!-- Right-side diff panel (slides in when a diff is available) -->
    <aside id="diff-panel" class="diff-panel hidden" aria-hidden="true">
        <header class="diff-panel-header">
            <div class="diff-panel-title">
                <span id="diff-panel-tool" class="diff-panel-tool"></span>
                <span id="diff-panel-path" class="diff-panel-path"></span>
            </div>
            <button id="diff-panel-close" class="diff-panel-close" title="Close">&times;</button>
        </header>
        <div id="diff-panel-body" class="diff-panel-body"></div>
        <footer id="diff-panel-footer" class="diff-panel-footer">
            <button id="diff-panel-deny" class="confirm-btn confirm-no">Deny</button>
            <button id="diff-panel-approve" class="confirm-btn confirm-yes">Approve</button>
        </footer>
    </aside>
    <div id="diff-panel-backdrop" class="diff-panel-backdrop hidden"></div>

    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
